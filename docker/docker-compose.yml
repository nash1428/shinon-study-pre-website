version: "3.8"

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ../src:/app/src
      - ../public:/app/public
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "4000:4000"
    volumes:
      - ../server:/app/server
    environment:
      - PORT=4000
      - NODE_ENV=development
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=study_notebook
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  yjs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.yjs
    ports:
      - "1234:1234"
    volumes:
      - ../server/yjs.js:/app/yjs.js

volumes:
  pgdata:
  qdrant_data:
